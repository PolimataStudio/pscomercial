<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <base href="/pscomercial/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produções – Polímata</title>
  <meta name="description" content="Portfólio de aplicativos, livros, projetos, estudos de caso e recursos digitais da Polímata.">
  
  <meta property="og:title" content="Produções – Polímata">
  <meta property="og:description" content="Conheça nosso portfólio de entregas digitais.">
  
  <link rel="canonical" href="https://polimatastudio.github.io/pscomercial/pages/producoes.html">
  <link rel="icon" href="assets/icons/favicon.ico">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest/manifest.json">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main>
    <section class="section">
      <div class="container">
        <h1 class="text-center">Nossas produções</h1>
        <p class="text-center" style="max-width: 700px; margin: 0 auto var(--space-6);">
          Apps, livros, projetos, estudos de caso e recursos que mostram nossa capacidade de entrega.
        </p>

        <div class="productions-grid" id="productions-grid-full">
          <!-- Preenchido via JavaScript -->
        </div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module" src="js/app.js"></script>
  <script type="module">
    import { renderProductions } from 'js/components.js';

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const productions = await fetch('data/productions.json').then(r => r.json());
        renderProductions(productions, '#productions-grid-full');
      } catch (e) {
        console.warn('Erro ao carregar produções:', e);
      }
    });
  </script>
</body>
</html>
